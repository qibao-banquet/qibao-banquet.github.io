<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宴会管理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#8B0000;--gold:#C5A55A;--bg:#FDF8F0;--card:#FFFFFF;--text:#333;--textl:#666;--border:#E8E0D0;--shadow:0 2px 12px rgba(0,0,0,.08)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,var(--red),#6B0000);color:#fff;padding:16px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header h1{font-size:22px;letter-spacing:2px}.header h1::before,.header h1::after{content:"✦";color:var(--gold);margin:0 8px;font-size:14px}
.header p{font-size:12px;color:var(--gold);letter-spacing:1px}
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:58px;z-index:99;overflow-x:auto}
.tab-btn{flex:1;min-width:80px;padding:12px 8px;border:none;background:none;font-size:14px;color:var(--textl);cursor:pointer;position:relative;transition:.2s;white-space:nowrap}
.tab-btn.active{color:var(--red);font-weight:600}
.tab-btn.active::after{content:"";position:absolute;bottom:0;left:20%;right:20%;height:3px;background:var(--red);border-radius:3px 3px 0 0}
.container{max-width:960px;margin:0 auto;padding:16px}
.tab-content{display:none}.tab-content.active{display:block}
.card{background:var(--card);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--border)}
.card h3{color:var(--red);font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#fff;transition:.2s}
.form-group input:focus,.form-group textarea:focus{border-color:var(--gold);outline:none;box-shadow:0 0 0 3px rgba(197,165,90,.15)}
.form-group textarea{resize:vertical;min-height:60px}
.chk-group{display:flex;flex-wrap:wrap;gap:8px}
.chk-group label{display:flex;align-items:center;gap:4px;padding:6px 12px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;transition:.2s;font-weight:400}
.chk-group label:has(input:checked){background:var(--red);color:#fff;border-color:var(--red)}
.chk-group input{display:none}
.btn{padding:10px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:#6B0000}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#A88B3A}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--gold)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-block{width:100%;justify-content:center}
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--border);border-radius:8px;font-size:14px}
.search-box input:focus{border-color:var(--gold);outline:none;box-shadow:0 0 0 3px rgba(197,165,90,.15)}
.search-box::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px}
.menu-cat{margin-bottom:12px}
.menu-cat-title{font-size:15px;color:var(--red);font-weight:700;padding:10px 0;border-bottom:2px solid var(--gold);margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.menu-cat-title::after{content:"▾";font-size:12px;color:var(--textl);transition:.2s}
.menu-cat.collapsed .menu-cat-title::after{transform:rotate(-90deg)}
.menu-cat.collapsed .menu-subs{display:none}
.menu-sub-title{font-size:12px;color:var(--gold);padding:4px 0;margin:6px 0 4px;font-weight:600}
.menu-items{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.menu-item{padding:5px 12px;border:1px solid var(--border);border-radius:20px;font-size:13px;cursor:pointer;transition:.2s;background:#fff;user-select:none}
.menu-item:hover{border-color:var(--gold);background:#FFFDF5}
.menu-item.selected{background:var(--red);color:#fff;border-color:var(--red)}
.sel-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px}
.sel-item:last-child{border-bottom:none}
.sel-item .cat{font-size:11px;color:var(--textl)}
.sel-item .rm{color:var(--red);cursor:pointer;font-weight:bold;padding:2px 8px;border-radius:4px}
.sel-item .rm:hover{background:rgba(139,0,0,.1)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-pending{background:#FFF3E0;color:#E65100}
.badge-ordered{background:#E3F2FD;color:#1565C0}
.badge-active{background:#E8F5E9;color:#2E7D32}
.badge-done{background:#F3E5F5;color:#6A1B9A}
.badge-rated{background:#FCE4EC;color:var(--red)}
.rec-item{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;background:#fff}
.rec-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;cursor:pointer}
.rec-hdr:hover{background:rgba(139,0,0,.02)}
.rec-info .date{font-weight:600;font-size:14px;color:var(--red)}
.rec-info .meta{font-size:12px;color:var(--textl);margin-top:2px}
.rec-detail{display:none;padding:12px 16px;background:rgba(253,248,240,.5);border-top:1px solid var(--border)}
.rec-detail.open{display:block}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:10px;padding:16px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border)}
.stat-card .value{font-size:28px;font-weight:700;color:var(--red)}
.stat-card .label{font-size:12px;color:var(--textl);margin-top:4px}
.bar-row{display:flex;align-items:center;margin-bottom:10px;gap:10px}
.bar-label{width:50px;font-size:13px;text-align:right;flex-shrink:0;font-weight:600}
.bar-track{flex:1;height:28px;background:#F0EBE0;border-radius:14px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--red));border-radius:14px;transition:width .6s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
.bar-fill span{font-size:11px;color:#fff;font-weight:600;white-space:nowrap}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--red);color:#fff;padding:8px 10px;text-align:left;font-weight:500}
td{padding:8px 10px;border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(139,0,0,.02)}
.slider-group{display:flex;align-items:center;gap:12px}
.slider-group input[type=range]{flex:1;-webkit-appearance:none;height:8px;border-radius:4px;background:linear-gradient(90deg,#4CAF50,#FFC107,var(--red));outline:none}
.slider-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:3px solid var(--red);cursor:pointer;box-shadow:0 2px 4px rgba(0,0,0,.2)}
.slider-value{font-size:22px;font-weight:700;color:var(--red);min-width:55px;text-align:center}
.radio-cards{display:flex;gap:10px;flex-wrap:wrap}
.radio-card{flex:1;min-width:80px;padding:14px;border:2px solid var(--border);border-radius:10px;text-align:center;cursor:pointer;transition:.2s}
.radio-card:hover{border-color:var(--gold)}
.radio-card.selected{border-color:var(--red);background:rgba(139,0,0,.05)}
.radio-card .emoji{font-size:28px;margin-bottom:4px}
.radio-card .name{font-size:14px;font-weight:600}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.log-entry{font-size:12px;color:var(--textl);padding:4px 0;border-bottom:1px dashed var(--border)}
.log-entry .time{color:var(--gold);font-weight:600}
.empty-state{text-align:center;padding:40px 20px;color:var(--textl)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.month-picker{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.month-picker input{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px}
.floating-count{position:fixed;bottom:20px;right:20px;background:var(--red);color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;box-shadow:0 4px 12px rgba(139,0,0,.3);z-index:90;display:none}
.confirm-box{background:#FFF8E1;border:1px solid #FFE082;border-radius:8px;padding:12px;margin-top:12px}
.dish-tag{display:inline-block;padding:3px 8px;margin:2px;border-radius:4px;font-size:12px;background:#FDF0E0;color:var(--text)}
@media(max-width:600px){
.container{padding:10px}.card{padding:14px}
.stat-cards{grid-template-columns:repeat(2,1fr)}
.tab-btn{font-size:12px;padding:10px 4px}
.radio-cards{flex-direction:column}
table{font-size:11px}th,td{padding:6px}
}
@media print{.header,.tabs,.btn,.search-box,.action-bar,.floating-count,.toast{display:none!important}.tab-content{display:block!important}.card{box-shadow:none;border:1px solid #ccc}body{background:#fff}}
</style>
</head>
<body>
<div class="header">
<h1>宴会管理系统</h1>
<p>BANQUET MANAGEMENT SYSTEM</p>
</div>
<div class="tabs">
<button class="tab-btn active" data-tab="create">📋 新建宴会</button>
<button class="tab-btn" data-tab="order">🍽️ 点菜</button>
<button class="tab-btn" data-tab="records">📑 宴会记录</button>
<button class="tab-btn" data-tab="report">📊 考核报表</button>
</div>
<div class="container">
<!-- Tab 1 -->
<div id="tab-create" class="tab-content active">
<div class="card">
<h3>🎊 创建新宴会</h3>
<div class="form-group"><label>宴会时间</label><input type="datetime-local" id="f-time"></div>
<div class="form-group"><label>宴会地点</label><input type="text" id="f-location" placeholder="请输入宴会地点"></div>
<div class="form-group"><label>预计人数</label><input type="number" id="f-count" min="1" max="999" placeholder="预计到场人数"></div>
<div class="form-group"><label>口味偏好（可多选）</label>
<div class="chk-group" id="f-taste">
<label><input type="checkbox" value="清淡">清淡</label>
<label><input type="checkbox" value="麻辣">麻辣</label>
<label><input type="checkbox" value="海鲜">海鲜</label>
<label><input type="checkbox" value="粤式">粤式</label>
<label><input type="checkbox" value="东北">东北</label>
<label><input type="checkbox" value="不限">不限</label>
</div></div>
<div class="form-group"><label>备注说明</label><textarea id="f-notes" placeholder="如有特殊要求请在此说明…"></textarea></div>
<button class="btn btn-primary btn-block" onclick="createBanquet()">创建宴会并开始点菜 →</button>
</div>
</div>
<!-- Tab 2 -->
<div id="tab-order" class="tab-content">
<div id="order-empty" class="card">
<div class="empty-state"><div class="icon">🍽️</div><p>请先选择或创建一个宴会</p>
<button class="btn btn-primary" style="margin-top:12px" onclick="switchTab('create')">去创建宴会</button></div>
</div>
<div id="order-panel" style="display:none">
<div class="card" style="padding:12px 16px">
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
<div><strong id="o-info" style="color:var(--red)"></strong><span id="o-meta" style="font-size:12px;color:var(--textl);display:block"></span></div>
<div style="display:flex;gap:6px;flex-wrap:wrap">
<button class="btn btn-outline btn-sm" onclick="copyMenu()">📋 复制菜单</button>
<button class="btn btn-outline btn-sm" onclick="window.print()">🖨️ 打印</button>
<button class="btn btn-gold btn-sm" onclick="confirmOrder()">✅ 确认菜单</button>
</div>
</div>
</div>
<div class="search-box"><input type="text" id="dish-search" placeholder="搜索菜品…" oninput="filterDishes()"></div>
<div id="menu-box"></div>
<div class="card"><h3>🧾 已选菜品 <span id="sel-count" style="font-size:13px;color:var(--gold)"></span></h3><div id="sel-list"></div></div>
</div>
</div>
<!-- Tab 3 -->
<div id="tab-records" class="tab-content"><div id="rec-list"></div></div>
<!-- Tab 4 -->
<div id="tab-report" class="tab-content">
<div class="month-picker"><label style="font-weight:600">📅 选择月份：</label><input type="month" id="rpt-month" onchange="renderReport()"></div>
<div id="rpt-stats"></div>
<div class="card"><h3>📋 宴会明细</h3><div style="overflow-x:auto"><table><thead><tr><th>日期</th><th>地点</th><th>人数</th><th>菜品数</th><th>服务员</th><th>剩余量</th></tr></thead><tbody id="rpt-tbody"></tbody></table></div></div>
<div class="card"><h3>👩‍🍳 服务员考核排名</h3><div id="waiter-rank"></div></div>
</div>
</div>
<div class="floating-count" id="fc"></div>
<div class="toast" id="toast"></div>

const WAITERS=[{name:"宁宁",emoji:"👩"},{name:"爽爽",emoji:"👩‍🦰"},{name:"欣欣",emoji:"👧"}];
const STATUS={pending:{t:"待点菜",c:"badge-pending"},ordered:{t:"已点菜",c:"badge-ordered"},confirmed:{t:"进行中",c:"badge-active"},done:{t:"已结束",c:"badge-done"},rated:{t:"已评价",c:"badge-rated"}};
const CAT_EMOJI={"凉菜":"🥗","热菜":"🔥","汤品":"🍲","主食":"🍚","水果":"🍊"};

// ===== STORAGE =====
function load(){try{return JSON.parse(localStorage.getItem('bq_data'))||[];}catch(e){return[];}}
function save(d){localStorage.setItem('bq_data',JSON.stringify(d));}

let curId=null; // current banquet id being edited

// ===== TOAST =====
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

// ===== TAB SWITCHING =====
function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tab-'+name));
  if(name==='order') renderOrder();
  if(name==='records') renderRecords();
  if(name==='report') renderReport();
}
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));

// ===== CREATE BANQUET =====
function createBanquet(){
  const time=document.getElementById('f-time').value;
  const location=document.getElementById('f-location').value.trim();
  const count=parseInt(document.getElementById('f-count').value)||0;
  const tastes=[...document.querySelectorAll('#f-taste input:checked')].map(i=>i.value);
  const notes=document.getElementById('f-notes').value.trim();
  if(!time){toast('请选择宴会时间');return;}
  if(!location){toast('请输入宴会地点');return;}
  if(!count){toast('请输入预计人数');return;}
  const data=load();
  const bq={id:Date.now().toString(),time,location,count,tastes,notes,dishes:[],status:'pending',actualCount:0,waiter:'',leftover:-1,logs:[{t:new Date().toLocaleString('zh-CN'),msg:'创建宴会'}],created:new Date().toISOString()};
  data.push(bq);save(data);
  curId=bq.id;
  document.getElementById('f-time').value='';
  document.getElementById('f-location').value='';
  document.getElementById('f-count').value='';
  document.querySelectorAll('#f-taste input').forEach(i=>i.checked=false);
  document.getElementById('f-notes').value='';
  toast('宴会创建成功！');
  switchTab('order');
}

// ===== RENDER ORDER / MENU =====
function renderOrder(){
  const data=load();
  const bq=curId?data.find(b=>b.id===curId):data.filter(b=>b.status==='pending'||b.status==='ordered')[0];
  if(!bq){document.getElementById('order-empty').style.display='';document.getElementById('order-panel').style.display='none';return;}
  curId=bq.id;
  document.getElementById('order-empty').style.display='none';
  document.getElementById('order-panel').style.display='';
  const d=new Date(bq.time);
  document.getElementById('o-info').textContent=d.toLocaleDateString('zh-CN',{month:'long',day:'numeric'})+'  '+bq.location;
  document.getElementById('o-meta').textContent='预计'+bq.count+'人 | '+bq.tastes.join('、');
  renderMenu(bq);
  renderSelected(bq);
  updateFC(bq);
}
function renderMenu(bq){
  const box=document.getElementById('menu-box');
  let html='';
  for(const[cat,subs]of Object.entries(MENU)){
    html+='<div class="menu-cat"><div class="menu-cat-title" onclick="this.parentElement.classList.toggle(\'collapsed\')">'+(CAT_EMOJI[cat]||'')+" "+cat+'</div><div class="menu-subs">';
    for(const[sub,items]of Object.entries(subs)){
      html+='<div class="menu-sub-title">'+sub+'</div><div class="menu-items">';
      items.forEach(item=>{
        const sel=bq.dishes.includes(item)?'selected':'';
        html+='<div class="menu-item '+sel+'" data-dish="'+item+'" onclick="toggleDish(this,\''+item.replace(/'/g,"\\'")+'\')">'+item+'</div>';
      });
      html+='</div>';
    }
    html+='</div></div>';
  }
  box.innerHTML=html;
  filterDishes();
}
function toggleDish(el,name){
  const data=load();const bq=data.find(b=>b.id===curId);if(!bq)return;
  const idx=bq.dishes.indexOf(name);
  if(idx>=0){bq.dishes.splice(idx,1);el.classList.remove('selected');}
  else{bq.dishes.push(name);el.classList.add('selected');}
  if(bq.status==='pending') bq.status='ordered';
  save(data);renderSelected(bq);updateFC(bq);
}
function renderSelected(bq){
  const list=document.getElementById('sel-list');
  const cnt=document.getElementById('sel-count');
  cnt.textContent='('+bq.dishes.length+'道)';
  if(!bq.dishes.length){list.innerHTML='<div class="empty-state" style="padding:20px"><p>还没选菜，从上方菜单中点击选择</p></div>';return;}
  let html='';
  bq.dishes.forEach(d=>{
    let cat='';
    for(const[c,subs]of Object.entries(MENU))for(const[s,items]of Object.entries(subs))if(items.includes(d))cat=c+' · '+s;
    html+='<div class="sel-item"><div><span>'+d+'</span> <span class="cat">'+cat+'</span></div><span class="rm" onclick="removeDish(\''+d.replace(/'/g,"\\'")+'\')">✕</span></div>';
  });
  list.innerHTML=html;
}
function removeDish(name){
  const data=load();const bq=data.find(b=>b.id===curId);if(!bq)return;
  bq.dishes=bq.dishes.filter(d=>d!==name);save(data);renderOrder();
}
function updateFC(bq){
  const fc=document.getElementById('fc');
  if(bq.dishes.length>0){fc.style.display='block';fc.textContent='已选 '+bq.dishes.length+' 道菜';}
  else{fc.style.display='none';}
}
function filterDishes(){
  const q=document.getElementById('dish-search').value.toLowerCase();
  document.querySelectorAll('.menu-item').forEach(el=>{
    el.style.display=el.dataset.dish.toLowerCase().includes(q)?'':'none';
  });
}

// ===== CONFIRM ORDER =====
function confirmOrder(){
  const data=load();const bq=data.find(b=>b.id===curId);if(!bq)return;
  if(!bq.dishes.length){toast('还没选菜呢');return;}
  bq.status='confirmed';
  bq.logs.push({t:new Date().toLocaleString('zh-CN'),msg:'菜单已确认，共'+bq.dishes.length+'道菜'});
  save(data);toast('菜单已确认！共'+bq.dishes.length+'道菜');
}
function copyMenu(){
  const data=load();const bq=data.find(b=>b.id===curId);if(!bq)return;
  const d=new Date(bq.time);
  let txt='🍽️ 宴会菜单\n';
  txt+='时间：'+d.toLocaleDateString('zh-CN')+(d.getHours()?(' '+d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})):'')+'\n';
  txt+='地点：'+bq.location+'\n';
  txt+='人数：'+bq.count+'人\n';
  if(bq.tastes.length)txt+='口味：'+bq.tastes.join('、')+'\n';
  txt+='━━━━━━━━━━━━━━━\n';
  for(const[cat,subs]of Object.entries(MENU)){
    const catDishes=bq.dishes.filter(d=>{for(const items of Object.values(subs))if(items.includes(d))return true;return false;});
    if(catDishes.length){txt+='\n'+(CAT_EMOJI[cat]||'')+' '+cat+'（'+catDishes.length+'道）\n';catDishes.forEach((d,i)=>{txt+='  '+(i+1)+'. '+d+'\n';});}
  }
  txt+='\n共 '+bq.dishes.length+' 道菜';
  if(bq.notes)txt+='\n备注：'+bq.notes;
  navigator.clipboard.writeText(txt).then(()=>toast('菜单已复制！')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('菜单已复制！');
  });
}

// ===== RECORDS =====
function renderRecords(){
  const data=load().sort((a,b)=>new Date(b.time)-new Date(a.time));
  const box=document.getElementById('rec-list');
  if(!data.length){box.innerHTML='<div class="card"><div class="empty-state"><div class="icon">📑</div><p>暂无宴会记录</p></div></div>';return;}
  let html='';
  data.forEach(bq=>{
    const d=new Date(bq.time);
    const st=STATUS[bq.status]||STATUS.pending;
    html+='<div class="rec-item"><div class="rec-hdr" onclick="toggleDetail(\''+bq.id+'\')"><div class="rec-info"><div class="date">'+d.toLocaleDateString('zh-CN')+'  '+bq.location+'</div><div class="meta">预计'+bq.count+'人'+(bq.actualCount?' / 实际'+bq.actualCount+'人':'')+' | '+bq.dishes.length+'道菜'+(bq.waiter?' | 服务员：'+bq.waiter:'')+'</div></div><span class="badge '+st.c+'">'+st.t+'</span></div>';
    html+='<div class="rec-detail" id="det-'+bq.id+'">';
    // dishes
    if(bq.dishes.length){html+='<div style="margin-bottom:10px"><strong>菜品：</strong><br>';bq.dishes.forEach(d=>{html+='<span class="dish-tag">'+d+'</span>';});html+='</div>';}
    if(bq.tastes&&bq.tastes.length)html+='<div style="margin-bottom:8px;font-size:13px"><strong>口味：</strong>'+bq.tastes.join('、')+'</div>';
    if(bq.notes)html+='<div style="margin-bottom:8px;font-size:13px"><strong>备注：</strong>'+bq.notes+'</div>';
    if(bq.leftover>=0)html+='<div style="margin-bottom:8px;font-size:13px"><strong>剩余量：</strong><span style="color:var(--red);font-weight:700">'+bq.leftover+'%</span></div>';
    // logs
    if(bq.logs&&bq.logs.length){html+='<div style="margin-top:8px"><strong style="font-size:12px">操作日志：</strong>';bq.logs.forEach(l=>{html+='<div class="log-entry"><span class="time">'+l.t+'</span> '+l.msg+'</div>';});html+='</div>';}
    // action buttons
    html+='<div class="action-bar">';
    if(bq.status==='pending'||bq.status==='ordered'){
      html+='<button class="btn btn-gold btn-sm" onclick="curId=\''+bq.id+'\';switchTab(\'order\')">🍽️ 去点菜</button>';
    }
    if(bq.status==='confirmed'){
      html+='<button class="btn btn-primary btn-sm" onclick="finishBanquet(\''+bq.id+'\')">✅ 用餐结束</button>';
    }
    if(bq.status==='done'){
      html+='<button class="btn btn-gold btn-sm" onclick="rateBanquet(\''+bq.id+'\')">⭐ 评价</button>';
    }
    html+='<button class="btn btn-outline btn-sm" onclick="deleteBanquet(\''+bq.id+'\')">🗑️ 删除</button>';
    html+='</div></div></div>';
  });
  box.innerHTML=html;
}
function toggleDetail(id){const el=document.getElementById('det-'+id);if(el)el.classList.toggle('open');}

// ===== FINISH BANQUET =====
function finishBanquet(id){
  const cnt=prompt('请输入实际到场人数：');
  if(cnt===null)return;
  const n=parseInt(cnt);if(!n||n<1){toast('请输入有效人数');return;}
  const data=load();const bq=data.find(b=>b.id===id);if(!bq)return;
  bq.actualCount=n;bq.status='done';
  bq.logs.push({t:new Date().toLocaleString('zh-CN'),msg:'用餐结束，实际'+n+'人'});
  save(data);toast('已记录，请评价');renderRecords();
}

// ===== RATE BANQUET =====
function rateBanquet(id){
  const data=load();const bq=data.find(b=>b.id===id);if(!bq)return;
  // create modal
  const mask=document.createElement('div');
  mask.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px';
  const box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:16px;padding:24px;max-width:400px;width:100%';
  box.innerHTML='<h3 style="color:var(--red);margin-bottom:16px;text-align:center">⭐ 宴会评价</h3>'+
    '<p style="font-size:13px;color:var(--textl);margin-bottom:12px;text-align:center">选择服务员并填写剩余量</p>'+
    '<div class="radio-cards" id="rate-waiters">'+WAITERS.map(w=>'<div class="radio-card" data-w="'+w.name+'" onclick="document.querySelectorAll(\'#rate-waiters .radio-card\').forEach(c=>c.classList.remove(\'selected\'));this.classList.add(\'selected\')"><div class="emoji">'+w.emoji+'</div><div class="name">'+w.name+'</div></div>').join('')+'</div>'+
    '<div style="margin-top:16px"><label style="font-size:13px;font-weight:600">剩余量</label><div class="slider-group"><input type="range" id="rate-slider" min="0" max="100" value="20" oninput="document.getElementById(\'rate-val\').textContent=this.value+\'%\'"><div class="slider-value" id="rate-val">20%</div></div><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--textl);margin-top:2px"><span>0% 无剩余</span><span>100% 全剩</span></div></div>'+
    '<div style="display:flex;gap:10px;margin-top:20px"><button class="btn btn-outline" style="flex:1" onclick="this.closest(\'div[style*=fixed]\').remove()">取消</button><button class="btn btn-primary" style="flex:1" id="rate-submit">提交评价</button></div>';
  mask.appendChild(box);document.body.appendChild(mask);
  mask.addEventListener('click',e=>{if(e.target===mask)mask.remove();});
  document.getElementById('rate-submit').addEventListener('click',()=>{
    const sel=box.querySelector('.radio-card.selected');
    if(!sel){toast('请选择服务员');return;}
    const waiter=sel.dataset.w;
    const leftover=parseInt(document.getElementById('rate-slider').value);
    bq.waiter=waiter;bq.leftover=leftover;bq.status='rated';
    bq.logs.push({t:new Date().toLocaleString('zh-CN'),msg:'评价完成：服务员'+waiter+'，剩余量'+leftover+'%'});
    save(data);mask.remove();toast('评价提交成功！');renderRecords();
  });
}

// ===== DELETE BANQUET =====
function deleteBanquet(id){
  if(!confirm('确定删除这条宴会记录？'))return;
  let data=load();data=data.filter(b=>b.id!==id);save(data);
  if(curId===id)curId=null;
  toast('已删除');renderRecords();
}

// ===== REPORT =====
function renderReport(){
  const monthInput=document.getElementById('rpt-month');
  if(!monthInput.value){const now=new Date();monthInput.value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');}
  const[y,m]=monthInput.value.split('-').map(Number);
  const data=load().filter(b=>{
    if(b.status!=='rated')return false;
    const d=new Date(b.time);return d.getFullYear()===y&&d.getMonth()+1===m;
  }).sort((a,b)=>new Date(a.time)-new Date(b.time));
  // stats
  const total=data.length;
  const avgLeft=total?Math.round(data.reduce((s,b)=>s+b.leftover,0)/total):0;
  const waiterStats={};
  data.forEach(b=>{if(!waiterStats[b.waiter])waiterStats[b.waiter]={count:0,total:0};waiterStats[b.waiter].count++;waiterStats[b.waiter].total+=b.leftover;});
  let bestWaiter='-';let bestAvg=999;
  for(const[w,s]of Object.entries(waiterStats)){const avg=s.total/s.count;if(avg<bestAvg){bestAvg=avg;bestWaiter=w;}}
  document.getElementById('rpt-stats').innerHTML='<div class="stat-cards"><div class="stat-card"><div class="value">'+total+'</div><div class="label">本月宴会次数</div></div><div class="stat-card"><div class="value">'+avgLeft+'%</div><div class="label">平均剩余量</div></div><div class="stat-card"><div class="value">'+bestWaiter+'</div><div class="label">最佳服务员</div></div></div>';
  // table
  const tbody=document.getElementById('rpt-tbody');
  if(!data.length){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--textl);padding:20px">本月暂无已评价的宴会数据</td></tr>';
  }else{
    tbody.innerHTML=data.map(bq=>{const d=new Date(bq.time);return '<tr><td>'+d.toLocaleDateString('zh-CN')+'</td><td>'+bq.location+'</td><td>'+bq.actualCount+'</td><td>'+bq.dishes.length+'</td><td>'+bq.waiter+'</td><td style="color:var(--red);font-weight:700">'+bq.leftover+'%</td></tr>';}).join('');
  }
  // waiter rank
  const rankBox=document.getElementById('waiter-rank');
  if(!Object.keys(waiterStats).length){rankBox.innerHTML='<div style="text-align:center;color:var(--textl);padding:16px">暂无数据</div>';return;}
  const sorted=Object.entries(waiterStats).map(([w,s])=>({name:w,avg:Math.round(s.total/s.count),count:s.count})).sort((a,b)=>a.avg-b.avg);
  rankBox.innerHTML=sorted.map(w=>'<div class="bar-row"><div class="bar-label">'+w.name+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.max(w.avg,5)+'%"><span>'+w.avg+'%</span></div></div><div style="font-size:11px;color:var(--textl);width:40px">'+w.count+'次</div></div>').join('');
}

// ===== INIT =====
renderReport();
</script>
</body>
</html>
