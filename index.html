<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宴会点菜系统</title>
<style>
/* ===== Password Lock Screen ===== */
#lockScreen{position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:linear-gradient(135deg,#0F1B3D,#003894,#005EAD);display:flex;align-items:center;justify-content:center;font-family:"Source Han Sans CN","PingFang SC","Microsoft YaHei",sans-serif}
#lockScreen.unlocked{display:none}
.lock-box{background:#fff;border-radius:16px;padding:40px 32px;width:90%;max-width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.lock-box .lock-icon{font-size:48px;margin-bottom:16px}
.lock-box h2{color:#003894;font-size:20px;margin-bottom:6px;letter-spacing:2px}
.lock-box .lock-sub{color:#888;font-size:13px;margin-bottom:24px}
.lock-box input{width:100%;padding:12px 16px;border:2px solid #E0E4EA;border-radius:10px;font-size:16px;text-align:center;outline:none;transition:.2s;letter-spacing:2px}
.lock-box input:focus{border-color:#FDD000;box-shadow:0 0 0 3px rgba(253,208,0,.15)}
.lock-box button{width:100%;margin-top:14px;padding:12px;background:#003894;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.lock-box button:hover{background:#005EAD}
.lock-box .lock-err{color:#e74c3c;font-size:13px;margin-top:10px;min-height:20px}
</style>
<style>
:root{--primary:#003894;--gold:#FDD000;--gold-text:#B38112;--bg:#F5F7FA;--card:#fff;--text:#2C2C2C;--dim:#666;--border:#E0E4EA;--shadow:0 2px 12px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Source Han Sans CN","PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}

.hd{background:linear-gradient(135deg,#003894,#005EAD);color:#fff;text-align:center;padding:36px 20px 28px;position:relative}
.hd::after{content:"";position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);width:50px;height:3px;background:var(--gold);border-radius:2px}
.hd h1{font-size:26px;letter-spacing:6px;margin-bottom:6px}
.hd p{font-size:13px;opacity:.75;letter-spacing:2px}

.wrap{max-width:820px;margin:0 auto;padding:0 16px}

.info{margin-top:36px}
.info .card{background:var(--card);border-radius:12px;padding:24px 28px;box-shadow:var(--shadow);display:flex;gap:20px;flex-wrap:wrap}
.info .f{flex:1;min-width:160px}
.info label{display:block;font-size:12px;color:var(--dim);margin-bottom:6px;font-weight:500}
.info input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#FAFBFD;transition:border .2s}
.info input:focus{outline:none;border-color:var(--gold);background:#fff}

.search{margin-top:16px}
.search input{width:100%;padding:10px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff}
.search input:focus{outline:none;border-color:var(--gold)}

.cats{margin-top:16px;padding-bottom:80px}
.cat{background:var(--card);border-radius:12px;margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden}
.cat-h{padding:14px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;transition:background .15s}
.cat-h:hover{background:#F0F3FA}
.cat-h h2{font-size:17px;font-weight:600;color:var(--primary);display:flex;align-items:center;gap:8px}
.cat-h .ic{font-size:20px}
.cat-h .rt{display:flex;align-items:center;gap:8px}
.cat-h .bg{background:var(--gold);color:#003894;font-size:11px;padding:1px 9px;border-radius:20px;font-weight:600;display:none}
.cat-h .bg.on{display:inline-block}
.cat-h .aw{font-size:12px;color:#aaa;transition:transform .25s}
.cat.open .aw{transform:rotate(180deg)}
.cat-b{display:none;padding:0 20px 16px}
.cat.open .cat-b{display:block}

.sub{margin-top:12px}
.sub h3{font-size:13px;color:var(--gold-text);font-weight:600;margin-bottom:8px;padding-bottom:5px;border-bottom:1px dashed var(--border);letter-spacing:1px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px}
.di{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:7px;cursor:pointer;border:1.5px solid transparent;transition:all .12s}
.di:hover{background:#F0F3FA}
.di.sel{background:#FDF8EE;border-color:var(--gold)}
.di input{display:none}
.di .ck{width:18px;height:18px;border:2px solid #ccc;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:transparent;transition:all .12s}
.di.sel .ck{background:var(--gold);border-color:var(--gold);color:#003894}
.di .nm{font-size:13px;line-height:1.4}

.bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:center;gap:14px;z-index:100;box-shadow:0 -4px 12px rgba(0,0,0,.05)}
.bar .cnt{font-size:14px;color:var(--dim)}
.bar .cnt b{color:var(--primary);font-size:18px}
.bar .btn-g{background:linear-gradient(135deg,#003894,#005EAD);color:#fff;border:none;padding:10px 32px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:2px;font-family:inherit;transition:all .2s}
.bar .btn-g:hover{box-shadow:0 4px 16px rgba(0,56,148,.35)}
.bar .btn-c{background:none;border:1.5px solid #ccc;padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--dim);font-family:inherit}
.bar .btn-c:hover{border-color:var(--primary);color:var(--primary)}

.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;justify-content:center;align-items:flex-start;padding:24px 16px;overflow-y:auto}
.ov.show{display:flex}
.pv{background:#FAFBFD;width:100%;max-width:600px;border-radius:14px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2)}

.pv-hd{background:linear-gradient(135deg,#003894,#005EAD);color:#fff;text-align:center;padding:36px 24px 28px;position:relative}
.pv-hd::before,.pv-hd::after{content:"◆";position:absolute;top:50%;transform:translateY(-50%);color:var(--gold);opacity:.25;font-size:36px}
.pv-hd::before{left:16px}.pv-hd::after{right:16px}
.pv-hd h1{font-size:28px;letter-spacing:8px;font-weight:700;margin-bottom:14px}
.pv-hd .line{width:40px;height:2px;background:var(--gold);margin:0 auto 14px}
.pv-hd .meta{font-size:13px;opacity:.9;line-height:1.8}

.pv-bd{padding:28px 24px}
.pv-cat{margin-bottom:22px}
.pv-cat h3{font-size:15px;color:var(--primary);font-weight:700;letter-spacing:3px;text-align:center;margin-bottom:10px}
.pv-cat h3::before,.pv-cat h3::after{content:"— ";color:var(--gold)}
.pv-cat h3::after{content:" —"}
.pv-sub h4{font-size:12px;color:var(--gold-text);margin:8px 0 4px;font-weight:500;text-align:center}
.pv-ds{text-align:center;font-size:14px;line-height:2.2;color:#333}
.pv-ds span{margin:0 3px;white-space:nowrap}
.pv-ds span+span::before{content:" · ";color:var(--gold)}

.pv-ft{text-align:center;padding:18px 24px 24px;border-top:1px dashed var(--border);margin:0 24px}
.pv-ft .wish{font-size:17px;color:var(--primary);letter-spacing:4px;font-weight:600}
.pv-ft .tot{font-size:12px;color:var(--dim);margin-top:6px}

.pv-act{display:flex;gap:10px;justify-content:center;padding:16px 24px 24px}
.pv-act button{padding:9px 24px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:1px;transition:all .2s}
.btn-p{background:var(--primary);color:#fff;border:none}
.btn-p:hover{opacity:.9}
.btn-b{background:none;border:1.5px solid #ccc;color:var(--dim)}
.btn-b:hover{border-color:var(--primary);color:var(--primary)}

@media print{
  body{background:#fff}
  .hd,.wrap,.bar,.pv-act{display:none!important}
  .ov{position:static;background:none;display:block!important;padding:0}
  .pv{box-shadow:none;border-radius:0;max-width:100%}
  .pv-hd{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@media(max-width:600px){
  .hd h1{font-size:21px;letter-spacing:3px}
  .info .card{flex-direction:column;gap:14px}
  .grid{grid-template-columns:1fr 1fr}
  .pv-hd h1{font-size:22px;letter-spacing:5px}
}
</style>
</head>
<body>

<!-- ===== Password Lock Screen ===== -->
<div id="lockScreen">
<div class="lock-box">
  <div class="lock-icon">🔒</div>
  <h2>宴会点菜系统</h2>
  <div class="lock-sub">请输入访问密码</div>
  <input type="password" id="lockPwd" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doUnlock()">
  <button onclick="doUnlock()">进入系统</button>
  <div class="lock-err" id="lockErr"></div>
</div>
</div>
<script>
(function(){
  var HASH='e1388ce88b0c9e96c537c192421b3708952a9834de9ef4a7c61271764f6aab32';
  var SKEY='banquet_unlocked';
  if(sessionStorage.getItem(SKEY)==='1'){document.getElementById('lockScreen').classList.add('unlocked')}
  window.doUnlock=function(){
    var pwd=document.getElementById('lockPwd').value;
    if(!pwd){document.getElementById('lockErr').textContent='请输入密码';return}
    crypto.subtle.digest('SHA-256',new TextEncoder().encode(pwd)).then(function(buf){
      var hex=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
      if(hex===HASH){sessionStorage.setItem(SKEY,'1');document.getElementById('lockScreen').classList.add('unlocked')}
      else{document.getElementById('lockErr').textContent='密码错误，请重试';document.getElementById('lockPwd').value='';document.getElementById('lockPwd').focus()}
    });
  };
})();
</script>

});

function doLogout(){
  fetch('/api/logout',{method:'POST',headers:{'Authorization':'Bearer '+AUTH_TOKEN}}).catch(function(){});

}

var sel=new Set();

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function render(q){
  q=(q||"").trim();
  var box=document.getElementById("cats");
  box.innerHTML="";
  D.forEach(function(cat){
    var body="",vis=0;
    cat.s.forEach(function(sub){
      var items="";
      sub.d.forEach(function(dish){
        if(q&&dish.indexOf(q)<0)return;
        vis++;
        var id=cat.n+"||"+sub.n+"||"+dish;
        var on=sel.has(id);
        items+='<label class="di'+(on?" sel":"")+'" data-id="'+esc(id)+'">'
          +'<input type="checkbox"'+(on?" checked":"")+'>'
          +'<span class="ck">✓</span><span class="nm">'+esc(dish)+'</span></label>';
      });
      if(!items)return;
      body+='<div class="sub">';
      if(sub.n)body+='<h3>'+esc(sub.n)+'</h3>';
      body+='<div class="grid">'+items+'</div></div>';
    });
    if(!body)return;
    var sc=0;sel.forEach(function(id){if(id.indexOf(cat.n+"||")===0)sc++});
    var el=document.createElement("div");
    el.className="cat"+(q?" open":"");
    el.innerHTML='<div class="cat-h"><h2><span class="ic">'+cat.ic+'</span>'+cat.n+'</h2>'
      +'<div class="rt"><span class="bg'+(sc?" on":"")+'">'+sc+'</span><span class="aw">▼</span></div></div>'
      +'<div class="cat-b">'+body+'</div>';
    el.querySelector(".cat-h").onclick=function(){el.classList.toggle("open")};
    box.appendChild(el);
  });
  bindDish();
}

function bindDish(){
  document.querySelectorAll(".di").forEach(function(el){
    el.onclick=function(e){
      e.preventDefault();
      var id=this.dataset.id;
      if(sel.has(id)){sel.delete(id);this.classList.remove("sel")}
      else{sel.add(id);this.classList.add("sel")}
      updCnt();updBadge();
    };
  });
}

function updCnt(){document.getElementById("sc").textContent=sel.size}

function updBadge(){
  document.querySelectorAll(".cat-h").forEach(function(h){
    var t=h.querySelector("h2").innerText;
    var b=h.querySelector(".bg");
    var cn="";D.forEach(function(c){if(t.indexOf(c.n)>=0)cn=c.n});
    if(!cn)return;
    var n=0;sel.forEach(function(id){if(id.indexOf(cn+"||")===0)n++});
    b.textContent=n;
    if(n)b.classList.add("on");else b.classList.remove("on");
  });
}

function clearAll(){sel.clear();updCnt();render(document.getElementById("iSearch").value)}

function gen(){
  if(!sel.size){alert("请至少选择一道菜品！");return}
  var t=document.getElementById("iTime").value;
  var num=document.getElementById("iNum").value;
  var nm=document.getElementById("iName").value||"宴会菜单";
  if(!t){alert("请填写宴会时间！");return}
  if(!num){alert("请填写宴会人数！");return}

  var dt=new Date(t);
  var ts=dt.getFullYear()+"年"+(dt.getMonth()+1)+"月"+dt.getDate()+"日 "
    +String(dt.getHours()).padStart(2,"0")+":"+String(dt.getMinutes()).padStart(2,"0");

  var html='<div class="pv-hd"><h1>'+esc(nm)+'</h1><div class="line"></div>'
    +'<div class="meta">'+esc(ts)+'<br>宴请人数：'+esc(num)+'位</div></div>';
  html+='<div class="pv-bd">';

  D.forEach(function(cat){
    var items=[];
    cat.s.forEach(function(sub){
      var dishes=[];
      sub.d.forEach(function(dish){
        var id=cat.n+"||"+sub.n+"||"+dish;
        if(sel.has(id))dishes.push(dish);
      });
      if(dishes.length)items.push({name:sub.n,dishes:dishes});
    });
    if(!items.length)return;
    html+='<div class="pv-cat"><h3>'+cat.ic+" "+cat.n+'</h3>';
    items.forEach(function(it){
      if(it.name)html+='<div class="pv-sub"><h4>'+esc(it.name)+'</h4></div>';
      html+='<div class="pv-ds">'+it.dishes.map(function(d){return'<span>'+esc(d)+'</span>'}).join("")+'</div>';
    });
    html+='</div>';
  });

  html+='</div>';
  html+='<div class="pv-ft"><div class="wish">祝您用餐愉快</div>'
    +'<div class="tot">共 '+sel.size+' 道菜品 · '+esc(num)+'位宾客</div></div>';
  html+='<div class="pv-act">'
    +'<button class="btn-b" onclick="closeOv()">返回修改</button>'
    +'<button class="btn-p" onclick="copyMenu()">📋 复制菜单</button>'
    +'<button class="btn-p" onclick="window.print()">🖨️ 打印菜单</button>'
    +'</div>';

  document.getElementById("pv").innerHTML=html;
  document.getElementById("ov").classList.add("show");
}

function copyMenu(){
  var t=document.getElementById("iTime").value;
  var num=document.getElementById("iNum").value;
  var nm=document.getElementById("iName").value||"宴会菜单";
  var dt=new Date(t);
  var ts=dt.getFullYear()+"年"+(dt.getMonth()+1)+"月"+dt.getDate()+"日 "
    +String(dt.getHours()).padStart(2,"0")+":"+String(dt.getMinutes()).padStart(2,"0");

  var txt="【"+nm+"】\n";
  txt+="时间："+ts+"\n";
  txt+="人数："+num+"位\n";
  txt+="━━━━━━━━━━━━━━\n";

  D.forEach(function(cat){
    var items=[];
    cat.s.forEach(function(sub){
      var dishes=[];
      sub.d.forEach(function(dish){
        var id=cat.n+"||"+sub.n+"||"+dish;
        if(sel.has(id))dishes.push(dish);
      });
      if(dishes.length)items.push({name:sub.n,dishes:dishes});
    });
    if(!items.length)return;
    txt+="\n"+cat.ic+" "+cat.n+"\n";
    items.forEach(function(it){
      if(it.name)txt+="  ▸ "+it.name+"\n";
      it.dishes.forEach(function(d,i){txt+="    "+(i+1)+"、"+d+"\n"});
    });
  });

  txt+="\n━━━━━━━━━━━━━━\n";
  txt+="共 "+sel.size+" 道菜品 · "+num+"位宾客\n";
  txt+="祝用餐愉快 🎉";

  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){
      alert("✅ 菜单已复制！可直接粘贴到微信发给厨师长");
    }).catch(function(){fallbackCopy(txt)});
  }else{fallbackCopy(txt)}
}

function fallbackCopy(txt){
  var ta=document.createElement("textarea");
  ta.value=txt;ta.style.position="fixed";ta.style.left="-9999px";
  document.body.appendChild(ta);ta.select();
  try{document.execCommand("copy");alert("✅ 菜单已复制！可直接粘贴到微信发给厨师长")}
  catch(e){alert("复制失败，请手动选择文字复制")}
  document.body.removeChild(ta);
}

function closeOv(){document.getElementById("ov").classList.remove("show")}

render("");
</script>
