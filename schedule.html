<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📅 值班排班系统</title>
<style>
  :root {
    --deep-red: #8B0000;
    --gold: #C5A55A;
    --bg: #FDF8F0;
    --weekend-bg: #E8F5E9;
    --modified-bg: #FFFDE7;
    --modified-border: #FFD54F;
    --text: #333;
    --header-text: #FDF8F0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--deep-red), #6B0000);
    color: var(--header-text);
    padding: 20px 16px 16px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header h1 {
    font-size: 1.6em;
    margin-bottom: 4px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  }
  .header .subtitle {
    font-size: 0.85em;
    color: var(--gold);
    opacity: 0.9;
  }

  /* Controls */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
    padding: 14px 12px;
    background: #fff;
    border-bottom: 2px solid var(--gold);
  }
  .controls select, .controls button {
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 0.95em;
    border: 1px solid #ccc;
    cursor: pointer;
  }
  .controls select {
    background: #fff;
    min-width: 80px;
  }
  .btn-primary {
    background: var(--deep-red);
    color: #fff;
    border-color: var(--deep-red) !important;
    font-weight: 600;
  }
  .btn-primary:hover { background: #A00000; }
  .btn-gold {
    background: var(--gold);
    color: #fff;
    border-color: var(--gold) !important;
    font-weight: 600;
  }
  .btn-gold:hover { background: #B8953F; }
  .btn-outline {
    background: #fff;
    color: var(--deep-red);
    border-color: var(--deep-red) !important;
    font-weight: 600;
  }
  .btn-outline:hover { background: #FFF0F0; }

  /* Table wrapper */
  .table-wrap {
    overflow-x: auto;
    padding: 12px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 520px;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  thead th {
    background: var(--deep-red);
    color: var(--header-text);
    padding: 10px 6px;
    font-size: 0.9em;
    font-weight: 600;
    text-align: center;
    white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,0.15);
  }
  thead th:last-child { border-right: none; }
  tbody td {
    padding: 9px 6px;
    text-align: center;
    border-bottom: 1px solid #eee;
    border-right: 1px solid #f0f0f0;
    font-size: 0.92em;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  tbody td:last-child { border-right: none; }
  tbody td:hover { background: #f5f0e5; }
  tbody tr.weekend { background: var(--weekend-bg); }
  tbody tr.weekend td:hover { background: #C8E6C9; }
  td.modified {
    background: var(--modified-bg) !important;
    border: 2px solid var(--modified-border) !important;
    font-weight: 700;
  }
  td.no-edit { cursor: default; color: #888; }
  td.no-edit:hover { background: inherit; }
  td.date-col, td.day-col { cursor: default; font-weight: 600; }
  td.date-col:hover, td.day-col:hover { background: inherit; }
  tr.weekend td.date-col:hover, tr.weekend td.day-col:hover { background: var(--weekend-bg); }

  /* Person badges */
  .person-c { color: #D32F2F; font-weight: 700; }
  .person-j { color: #1565C0; font-weight: 700; }
  .person-z { color: #2E7D32; font-weight: 700; }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    padding: 10px 12px 6px;
    font-size: 0.85em;
    color: #666;
  }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .legend .dot {
    width: 12px; height: 12px; border-radius: 3px; display: inline-block;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    min-width: 220px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    text-align: center;
  }
  .modal h3 { margin-bottom: 14px; color: var(--deep-red); font-size: 1em; }
  .modal .choices {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .modal .choice-btn {
    width: 52px; height: 52px;
    border-radius: 10px;
    font-size: 1.3em;
    font-weight: 700;
    border: 2px solid #ddd;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal .choice-btn:hover { transform: scale(1.1); }
  .modal .choice-btn.sel-c { background: #FFEBEE; color: #D32F2F; border-color: #D32F2F; }
  .modal .choice-btn.sel-j { background: #E3F2FD; color: #1565C0; border-color: #1565C0; }
  .modal .choice-btn.sel-z { background: #E8F5E9; color: #2E7D32; border-color: #2E7D32; }
  .modal .choice-btn.sel-empty { background: #f5f5f5; color: #999; border-color: #ccc; font-size: 0.9em; }
  .modal .cancel-btn {
    margin-top: 12px;
    padding: 6px 20px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    font-size: 0.9em;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #333;
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 0.95em;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 2000;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Print */
  @media print {
    .header { padding: 10px; }
    .controls, .legend, .toast, .modal-overlay { display: none !important; }
    .table-wrap { padding: 0; }
    table { box-shadow: none; }
    tbody td { cursor: default; }
    body { background: #fff; }
  }

  /* Mobile */
  @media (max-width: 600px) {
    .header h1 { font-size: 1.25em; }
    .controls { gap: 6px; padding: 10px 8px; }
    .controls select, .controls button { padding: 7px 10px; font-size: 0.85em; }
    .table-wrap { padding: 6px; }
    thead th, tbody td { padding: 7px 4px; font-size: 0.82em; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>📅 值班排班系统</h1>
  <div class="subtitle">c · j · z 三人轮班 — 14天周期自动排班</div>
</div>

<div class="controls">
  <select id="yearSel"></select>
  <select id="monthSel"></select>
  <button class="btn-primary" onclick="generate()">生成排班</button>
  <button class="btn-outline" onclick="resetMonth()">重置本月</button>
  <button class="btn-gold" onclick="copyText()">📋 复制文字版</button>
  <button class="btn-gold" onclick="exportPDF()">🖨️ 导出PDF</button>
</div>

<div class="legend">
  <span><span class="dot" style="background:#FFCDD2"></span> <b class="person-c">c</b></span>
  <span><span class="dot" style="background:#BBDEFB"></span> <b class="person-j">j</b></span>
  <span><span class="dot" style="background:#C8E6C9"></span> <b class="person-z">z</b></span>
  <span><span class="dot" style="background:var(--weekend-bg)"></span> 周末</span>
  <span><span class="dot" style="background:var(--modified-bg);border:1.5px solid var(--modified-border)"></span> 手动调整</span>
</div>

<div class="table-wrap">
  <table id="scheduleTable">
    <thead>
      <tr>
        <th>日期</th>
        <th>星期</th>
        <th>主驾</th>
        <th>副驾</th>
        <th>夜(17-8⁺¹)</th>
        <th>白休</th>
        <th>全休</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">选择值班人员</h3>
    <div class="choices">
      <button class="choice-btn sel-c" onclick="pick('c')">c</button>
      <button class="choice-btn sel-j" onclick="pick('j')">j</button>
      <button class="choice-btn sel-z" onclick="pick('z')">z</button>
      <button class="choice-btn sel-empty" onclick="pick('')">空</button>
    </div>
    <button class="cancel-btn" onclick="closeModal()">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== 14-day cycle schedule =====
// Index 0 = Saturday (anchor: 2026-03-07)
// Columns: [main, deputy, night, dayOff, fullOff]
// dayOff applies weekday, fullOff applies weekend
const CYCLE = [
  // Week 1
  { main:'c', deputy:'j', night:'c', dayOff:'',  fullOff:'z' }, // Sat  0
  { main:'z', deputy:'j', night:'z', dayOff:'',  fullOff:'c' }, // Sun  1
  { main:'c', deputy:'z', night:'c', dayOff:'',  fullOff:'j' }, // Mon  2
  { main:'j', deputy:'c', night:'z', dayOff:'z', fullOff:''  }, // Tue  3
  { main:'j', deputy:'z', night:'c', dayOff:'c', fullOff:''  }, // Wed  4
  { main:'j', deputy:'c', night:'z', dayOff:'z', fullOff:''  }, // Thu  5
  { main:'j', deputy:'z', night:'c', dayOff:'c', fullOff:''  }, // Fri  6
  // Week 2
  { main:'z', deputy:'j', night:'z', dayOff:'',  fullOff:'c' }, // Sat  7
  { main:'c', deputy:'j', night:'c', dayOff:'',  fullOff:'z' }, // Sun  8
  { main:'z', deputy:'c', night:'z', dayOff:'',  fullOff:'j' }, // Mon  9
  { main:'j', deputy:'z', night:'c', dayOff:'c', fullOff:''  }, // Tue  10
  { main:'j', deputy:'c', night:'z', dayOff:'z', fullOff:''  }, // Wed  11
  { main:'j', deputy:'z', night:'c', dayOff:'c', fullOff:''  }, // Thu  12
  { main:'j', deputy:'c', night:'z', dayOff:'z', fullOff:''  }, // Fri  13
];

// Anchor: 2026-03-07 (Saturday) = cycle index 0
const ANCHOR = new Date(2026, 2, 7); // month is 0-indexed

const DAY_NAMES = ['日','一','二','三','四','五','六'];

let currentYear, currentMonth;
let autoSchedule = []; // auto-generated for current month
let modifications = {}; // key: "day-col" -> value

// ===== Helpers =====
function getCycleIndex(date) {
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diff = Math.round((d - ANCHOR) / 86400000);
  return ((diff % 14) + 14) % 14;
}

function isWeekend(date) {
  const dow = date.getDay();
  return dow === 0 || dow === 6;
}

function storageKey(y, m) { return `schedule_mods_${y}_${m}`; }

function loadMods(y, m) {
  try {
    const s = localStorage.getItem(storageKey(y, m));
    return s ? JSON.parse(s) : {};
  } catch { return {}; }
}

function saveMods(y, m, mods) {
  if (Object.keys(mods).length === 0) {
    localStorage.removeItem(storageKey(y, m));
  } else {
    localStorage.setItem(storageKey(y, m), JSON.stringify(mods));
  }
}

function personHTML(p) {
  if (!p) return '';
  return `<span class="person-${p}">${p}</span>`;
}

// ===== Core =====
function generate() {
  currentYear = parseInt(document.getElementById('yearSel').value);
  currentMonth = parseInt(document.getElementById('monthSel').value);

  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  autoSchedule = [];

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(currentYear, currentMonth, d);
    const ci = getCycleIndex(date);
    const entry = CYCLE[ci];
    const we = isWeekend(date);
    autoSchedule.push({
      day: d,
      dow: date.getDay(),
      isWeekend: we,
      main: entry.main,
      deputy: entry.deputy,
      night: entry.night,
      dayOff: we ? '' : entry.dayOff,
      fullOff: we ? entry.fullOff : ''
    });
  }

  modifications = loadMods(currentYear, currentMonth);
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  let html = '';

  for (const row of autoSchedule) {
    const we = row.isWeekend;
    html += `<tr class="${we ? 'weekend' : ''}">`;

    // Date col
    html += `<td class="date-col">${currentMonth+1}/${row.day}</td>`;
    // Day col
    html += `<td class="day-col">周${DAY_NAMES[row.dow]}</td>`;

    // Editable columns: main(2), deputy(3), night(4), dayOff(5), fullOff(6)
    const cols = ['main','deputy','night','dayOff','fullOff'];
    const colIdx = [2,3,4,5,6];

    for (let i = 0; i < cols.length; i++) {
      const col = cols[i];
      const ci = colIdx[i];
      const key = `${row.day}-${ci}`;
      const isModified = modifications.hasOwnProperty(key);
      const val = isModified ? modifications[key] : row[col];

      // dayOff only for weekday, fullOff only for weekend
      if ((col === 'dayOff' && we) || (col === 'fullOff' && !we)) {
        html += `<td class="no-edit">—</td>`;
        continue;
      }

      const modClass = isModified ? ' modified' : '';
      html += `<td class="${modClass}" onclick="openModal(${row.day},${ci},'${col}')">${personHTML(val)}</td>`;
    }

    html += '</tr>';
  }

  tbody.innerHTML = html;
}

// ===== Modal =====
let editDay, editCol, editColName;

function openModal(day, col, colName) {
  editDay = day;
  editCol = col;
  editColName = colName;
  const colLabels = {2:'主驾',3:'副驾',4:'夜班',5:'白休',6:'全休'};
  document.getElementById('modalTitle').textContent =
    `${currentMonth+1}/${day} — 修改「${colLabels[col]}」`;
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function pick(val) {
  const key = `${editDay}-${editCol}`;
  const rowData = autoSchedule.find(r => r.day === editDay);
  const autoVal = rowData[editColName];

  if (val === autoVal) {
    delete modifications[key];
  } else {
    modifications[key] = val;
  }

  saveMods(currentYear, currentMonth, modifications);
  renderTable();
  closeModal();
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ===== Reset =====
function resetMonth() {
  if (!confirm('确定要重置本月所有手动调整？')) return;
  modifications = {};
  saveMods(currentYear, currentMonth, modifications);
  renderTable();
  showToast('已重置本月排班');
}

// ===== Copy text =====
function copyText() {
  const colLabels = ['主驾','副驾','夜班','白休','全休'];
  let text = `📅 ${currentYear}年${currentMonth+1}月 值班排班表\n`;
  text += '━'.repeat(28) + '\n';

  for (const row of autoSchedule) {
    const we = row.isWeekend;
    const cols = ['main','deputy','night','dayOff','fullOff'];
    const colIdxs = [2,3,4,5,6];
    let line = `${String(currentMonth+1).padStart(2)}/${String(row.day).padStart(2)} 周${DAY_NAMES[row.dow]}  `;

    for (let i = 0; i < cols.length; i++) {
      const col = cols[i];
      const ci = colIdxs[i];
      if ((col === 'dayOff' && we) || (col === 'fullOff' && !we)) continue;
      const key = `${row.day}-${ci}`;
      const val = modifications.hasOwnProperty(key) ? modifications[key] : row[col];
      const mod = modifications.hasOwnProperty(key) ? '*' : '';
      if (val) line += `${colLabels[i]}:${val}${mod} `;
    }

    text += line.trimEnd() + '\n';
  }

  text += '━'.repeat(28) + '\n';
  text += '* 表示手动调整\n';

  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('已复制到剪贴板！');
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('已复制到剪贴板！'); }
  catch { showToast('复制失败，请手动复制'); }
  document.body.removeChild(ta);
}

// ===== PDF =====
function exportPDF() {
  window.print();
}

// ===== Toast =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== Init =====
(function init() {
  const now = new Date();
  const yearSel = document.getElementById('yearSel');
  const monthSel = document.getElementById('monthSel');

  for (let y = 2025; y <= 2030; y++) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y + '年';
    if (y === now.getFullYear()) opt.selected = true;
    yearSel.appendChild(opt);
  }

  for (let m = 0; m < 12; m++) {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = (m+1) + '月';
    if (m === now.getMonth()) opt.selected = true;
    monthSel.appendChild(opt);
  }

  generate();
})();
</script>
</body>
</html>
